name: "Open Review"
description: "AI-powered code review for pull requests"
branding:
  icon: "eye"
  color: "blue"

inputs:
  provider:
    description: "LLM provider (anthropic, openai, openrouter)"
    required: true
  model:
    description: "Model to use (e.g., claude-sonnet-4-20250514)"
    required: true
  api_key:
    description: "API key for the provider"
    required: true
  conventions:
    description: "Path to conventions file (optional, auto-detected by default)"
    required: false
    default: ""
  ignore:
    description: "Comma-separated glob patterns to ignore"
    required: false
    default: ""

outputs:
  verdict:
    description: "Review verdict (approve, request_changes, comment)"
    value: ${{ steps.review.outputs.verdict }}
  summary:
    description: "Review summary"
    value: ${{ steps.review.outputs.summary }}
  findings_count:
    description: "Number of findings"
    value: ${{ steps.review.outputs.findings_count }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Install Open Review
      shell: bash
      run: |
        git clone --depth 1 https://github.com/elliottlawson/open-review.git /tmp/open-review
        cd /tmp/open-review
        npm install --legacy-peer-deps
        npm run build
        npm link

    - name: Install Action Dependencies
      shell: bash
      run: |
        cd ${{ github.action_path }}
        npm install

    - name: Run Review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.provider == 'anthropic' && inputs.api_key || '' }}
        OPENAI_API_KEY: ${{ inputs.provider == 'openai' && inputs.api_key || '' }}
        OPENROUTER_API_KEY: ${{ inputs.provider == 'openrouter' && inputs.api_key || '' }}
      run: |
        # Build review args
        REVIEW_ARGS="--diff origin/${{ github.event.pull_request.base.ref }} --json"
        if [ -n "${{ inputs.conventions }}" ]; then
          REVIEW_ARGS="$REVIEW_ARGS --instructions ${{ inputs.conventions }}"
        fi

        # Run review and save to temp file
        RESULT_FILE=$(mktemp)
        open-review review . $REVIEW_ARGS > "$RESULT_FILE"
        echo "result_file=$RESULT_FILE" >> $GITHUB_OUTPUT

        # Parse outputs
        echo "verdict=$(jq -r '.recommendation' "$RESULT_FILE")" >> $GITHUB_OUTPUT
        echo "summary=$(jq -r '.summary' "$RESULT_FILE" | head -c 1000)" >> $GITHUB_OUTPUT
        echo "findings_count=$(jq '.findings | length' "$RESULT_FILE")" >> $GITHUB_OUTPUT

    - name: Post Review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
        RESULT_FILE: ${{ steps.review.outputs.result_file }}
      run: |
        cd ${{ github.action_path }}
        node format-and-post.js
        rm -f "$RESULT_FILE"
